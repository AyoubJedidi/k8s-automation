---
- name: Bootstrap Kubernetes worker nodes
  hosts: workers
  gather_facts: false

  vars:
    pod_subnets:
      node-0: "10.200.0.0/24"
      node-1: "10.200.1.0/24"

  tasks:
    # ── OS dependencies (offline via .deb) ───────────────────────────────────
    - name: Copy .deb packages to worker
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/tmp/{{ item | basename }}"
      with_fileglob:
        - /tmp/k8s-worker/*.deb

    - name: Install OS dependencies from .deb
      ansible.builtin.shell: dpkg -i /tmp/*.deb
      changed_when: true

    - name: Disable swap
      ansible.builtin.shell: swapoff -a
      changed_when: false

    # ── Directories ───────────────────────────────────────────────────────────
    - name: Create worker directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/cni/net.d
        - /opt/cni/bin
        - /var/lib/kubelet
        - /var/lib/kube-proxy
        - /var/lib/kubernetes
        - /var/run/kubernetes
        - /etc/containerd

    # ── Copy binaries ─────────────────────────────────────────────────────────
    - name: Copy kubelet
      ansible.builtin.copy:
        src: /tmp/k8s-worker/kubelet
        dest: /usr/local/bin/kubelet
        mode: "0755"

    - name: Copy kube-proxy
      ansible.builtin.copy:
        src: /tmp/k8s-worker/kube-proxy
        dest: /usr/local/bin/kube-proxy
        mode: "0755"

    - name: Copy kubectl
      ansible.builtin.copy:
        src: /tmp/kubectl
        dest: /usr/local/bin/kubectl
        mode: "0755"

    - name: Copy runc
      ansible.builtin.copy:
        src: /tmp/k8s-worker/runc
        dest: /usr/local/bin/runc
        mode: "0755"

    - name: Copy crictl
      ansible.builtin.copy:
        src: /tmp/k8s-worker/crictl
        dest: /usr/local/bin/crictl
        mode: "0755"

    - name: Copy containerd binaries
      ansible.builtin.copy:
        src: "/tmp/k8s-worker/{{ item }}"
        dest: "/bin/{{ item }}"
        mode: "0755"
      loop:
        - containerd
        - containerd-shim-runc-v2

    - name: Copy CNI plugins
      ansible.builtin.copy:
        src: "/tmp/k8s-worker/cni-plugins/"
        dest: /opt/cni/bin/
        mode: "0755"

    # ── CNI networking ────────────────────────────────────────────────────────
    - name: Create bridge CNI config
      ansible.builtin.copy:
        dest: /etc/cni/net.d/10-bridge.conf
        content: |
          {
            "cniVersion": "1.0.0",
            "name": "bridge",
            "type": "bridge",
            "bridge": "cni0",
            "isGateway": true,
            "ipMasq": true,
            "ipam": {
              "type": "host-local",
              "ranges": [
                [{"subnet": "{{ pod_subnets[hostname] }}"}]
              ],
              "routes": [{"dst": "0.0.0.0/0"}]
            }
          }

    - name: Create loopback CNI config
      ansible.builtin.copy:
        dest: /etc/cni/net.d/99-loopback.conf
        content: |
          {
            "cniVersion": "1.1.0",
            "name": "lo",
            "type": "loopback"
          }

    - name: Load br-netfilter kernel module now
      ansible.builtin.shell: modprobe br-netfilter
      changed_when: false

    - name: Persist br-netfilter on boot
      ansible.builtin.lineinfile:
        path: /etc/modules-load.d/modules.conf
        line: br-netfilter
        create: true

    - name: Set bridge iptables sysctl
      ansible.builtin.copy:
        dest: /etc/sysctl.d/kubernetes.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1

    - name: Apply sysctl
      ansible.builtin.shell: sysctl -p /etc/sysctl.d/kubernetes.conf
      changed_when: false

    # ── containerd ────────────────────────────────────────────────────────────
    - name: Create containerd config
      ansible.builtin.copy:
        dest: /etc/containerd/config.toml
        content: |
          version = 2

          [plugins."io.containerd.grpc.v1.cri"]
            [plugins."io.containerd.grpc.v1.cri".containerd]
              snapshotter = "overlayfs"
              default_runtime_name = "runc"
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
              runtime_type = "io.containerd.runc.v2"
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
              SystemdCgroup = true
          [plugins."io.containerd.grpc.v1.cni"]
            bin_dir = "/opt/cni/bin"
            conf_dir = "/etc/cni/net.d"

    - name: Create containerd systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/containerd.service
        content: |
          [Unit]
          Description=containerd container runtime
          Documentation=https://containerd.io
          After=network.target

          [Service]
          ExecStartPre=/sbin/modprobe overlay
          ExecStart=/bin/containerd
          Restart=always
          RestartSec=5
          Delegate=yes
          KillMode=process
          OOMScoreAdjust=-999
          LimitNOFILE=1048576
          LimitNPROC=infinity
          LimitCORE=infinity

          [Install]
          WantedBy=multi-user.target

    # ── kubelet ───────────────────────────────────────────────────────────────
    - name: Copy CA cert to kubelet dir
      ansible.builtin.copy:
        src: /tmp/k8s-certs/ca.pem
        dest: /var/lib/kubelet/ca.crt
        mode: "0600"

    - name: Copy kubelet cert
      ansible.builtin.copy:
        src: "/tmp/k8s-certs/{{ hostname }}.pem"
        dest: /var/lib/kubelet/kubelet.crt
        mode: "0600"

    - name: Copy kubelet key
      ansible.builtin.copy:
        src: "/tmp/k8s-certs/{{ hostname }}-key.pem"
        dest: /var/lib/kubelet/kubelet.key
        mode: "0600"

    - name: Create kubelet config
      ansible.builtin.copy:
        dest: /var/lib/kubelet/kubelet-config.yaml
        content: |
          kind: KubeletConfiguration
          apiVersion: kubelet.config.k8s.io/v1beta1
          address: "0.0.0.0"
          authentication:
            anonymous:
              enabled: false
            webhook:
              enabled: true
            x509:
              clientCAFile: "/var/lib/kubelet/ca.crt"
          authorization:
            mode: Webhook
          cgroupDriver: systemd
          containerRuntimeEndpoint: "unix:///var/run/containerd/containerd.sock"
          enableServer: true
          failSwapOn: false
          maxPods: 16
          memorySwap:
            swapBehavior: NoSwap
          port: 10250
          resolvConf: "/etc/resolv.conf"
          registerNode: true
          runtimeRequestTimeout: "15m"
          tlsCertFile: "/var/lib/kubelet/kubelet.crt"
          tlsPrivateKeyFile: "/var/lib/kubelet/kubelet.key"

    - name: Create kubelet systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/kubelet.service
        content: |
          [Unit]
          Description=Kubernetes Kubelet
          Documentation=https://github.com/kubernetes/kubernetes
          After=containerd.service
          Requires=containerd.service

          [Service]
          ExecStart=/usr/local/bin/kubelet \
            --config=/var/lib/kubelet/kubelet-config.yaml \
            --kubeconfig=/var/lib/kubelet/kubeconfig \
            --v=2
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    # ── kube-proxy ────────────────────────────────────────────────────────────
    - name: Create kube-proxy config
      ansible.builtin.copy:
        dest: /var/lib/kube-proxy/kube-proxy-config.yaml
        content: |
          kind: KubeProxyConfiguration
          apiVersion: kubeproxy.config.k8s.io/v1alpha1
          clientConnection:
            kubeconfig: "/var/lib/kube-proxy/kubeconfig"
          mode: "iptables"
          clusterCIDR: "10.200.0.0/16"

    - name: Create kube-proxy systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/kube-proxy.service
        content: |
          [Unit]
          Description=Kubernetes Kube Proxy
          Documentation=https://github.com/kubernetes/kubernetes

          [Service]
          ExecStart=/usr/local/bin/kube-proxy \
            --config=/var/lib/kube-proxy/kube-proxy-config.yaml
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    # ── Start services ────────────────────────────────────────────────────────
    - name: Enable and start worker services
      ansible.builtin.systemd:
        name: "{{ item }}"
        daemon_reload: true
        enabled: true
        state: started
      loop:
        - containerd
        - kubelet
        - kube-proxy

    - name: Verify kubelet is active
      ansible.builtin.shell: systemctl is-active kubelet
      register: kubelet_status
      changed_when: false

    - name: Show kubelet status
      ansible.builtin.debug:
        msg: "kubelet on {{ hostname }}: {{ kubelet_status.stdout }}"

- name: Verify nodes registered on control plane
  hosts: control_plane
  gather_facts: false

  tasks:
    - name: Wait for nodes to register
      ansible.builtin.shell: kubectl get nodes --kubeconfig /root/admin.kubeconfig
      register: nodes
      until: "'node-0' in nodes.stdout and 'node-1' in nodes.stdout"
      retries: 12
      delay: 10
      changed_when: false

    - name: Show nodes
      ansible.builtin.debug:
        msg: "{{ nodes.stdout }}"
