---
- name: Bootstrap Kubernetes control plane on server
  hosts: control_plane
  gather_facts: false

  vars:
    server_ip: "10.142.131.11"

  tasks:
    # ── Install binaries ──────────────────────────────────────────────────────
    - name: Copy kube-apiserver
      ansible.builtin.copy:
        src: /tmp/kube-apiserver
        dest: /usr/local/bin/kube-apiserver
        mode: "0755"

    - name: Copy kube-controller-manager
      ansible.builtin.copy:
        src: /tmp/kube-controller-manager
        dest: /usr/local/bin/kube-controller-manager
        mode: "0755"

    - name: Copy kube-scheduler
      ansible.builtin.copy:
        src: /tmp/kube-scheduler
        dest: /usr/local/bin/kube-scheduler
        mode: "0755"

    - name: Copy kubectl
      ansible.builtin.copy:
        src: /tmp/kubectl
        dest: /usr/local/bin/kubectl
        mode: "0755"

    # ── Create directories ────────────────────────────────────────────────────
    - name: Create kubernetes config and data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/kubernetes/config
        - /var/lib/kubernetes

    # ── Copy certs and configs ────────────────────────────────────────────────
    - name: Copy certs to /var/lib/kubernetes
      ansible.builtin.copy:
        src: "/tmp/k8s-certs/{{ item.src }}"
        dest: "/var/lib/kubernetes/{{ item.dest }}"
        mode: "0600"
      loop:
        - { src: ca.pem,                  dest: ca.crt }
        - { src: ca-key.pem,              dest: ca.key }
        - { src: kubernetes.pem,          dest: kube-api-server.crt }
        - { src: kubernetes-key.pem,      dest: kube-api-server.key }
        - { src: service-account.pem,     dest: service-accounts.crt }
        - { src: service-account-key.pem, dest: service-accounts.key }

    - name: Copy encryption config
      ansible.builtin.copy:
        src: /tmp/k8s-configs/encryption-config.yaml
        dest: /var/lib/kubernetes/encryption-config.yaml
        mode: "0600"

    - name: Copy kubeconfigs to /var/lib/kubernetes
      ansible.builtin.copy:
        src: "/tmp/k8s-configs/{{ item }}"
        dest: "/var/lib/kubernetes/{{ item }}"
        mode: "0600"
      loop:
        - kube-controller-manager.kubeconfig
        - kube-scheduler.kubeconfig

    # ── kube-apiserver ────────────────────────────────────────────────────────
    - name: Create kube-apiserver systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/kube-apiserver.service
        content: |
          [Unit]
          Description=Kubernetes API Server
          Documentation=https://github.com/kubernetes/kubernetes

          [Service]
          ExecStart=/usr/local/bin/kube-apiserver \
            --allow-privileged=true \
            --audit-log-maxage=30 \
            --audit-log-maxbackup=3 \
            --audit-log-maxsize=100 \
            --audit-log-path=/var/log/audit.log \
            --authorization-mode=Node,RBAC \
            --bind-address=0.0.0.0 \
            --client-ca-file=/var/lib/kubernetes/ca.crt \
            --enable-admission-plugins=NamespaceLifecycle,NodeRestriction,LimitRanger,ServiceAccount,DefaultStorageClass,ResourceQuota \
            --etcd-servers=http://127.0.0.1:2379 \
            --event-ttl=1h \
            --encryption-provider-config=/var/lib/kubernetes/encryption-config.yaml \
            --kubelet-certificate-authority=/var/lib/kubernetes/ca.crt \
            --kubelet-client-certificate=/var/lib/kubernetes/kube-api-server.crt \
            --kubelet-client-key=/var/lib/kubernetes/kube-api-server.key \
            --runtime-config='api/all=true' \
            --service-account-key-file=/var/lib/kubernetes/service-accounts.crt \
            --service-account-signing-key-file=/var/lib/kubernetes/service-accounts.key \
            --service-account-issuer=https://{{ server_ip }}:6443 \
            --service-node-port-range=30000-32767 \
            --tls-cert-file=/var/lib/kubernetes/kube-api-server.crt \
            --tls-private-key-file=/var/lib/kubernetes/kube-api-server.key \
            --v=2
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    # ── kube-controller-manager ───────────────────────────────────────────────
    - name: Create kube-controller-manager systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/kube-controller-manager.service
        content: |
          [Unit]
          Description=Kubernetes Controller Manager
          Documentation=https://github.com/kubernetes/kubernetes

          [Service]
          ExecStart=/usr/local/bin/kube-controller-manager \
            --bind-address=0.0.0.0 \
            --cluster-cidr=10.200.0.0/16 \
            --cluster-name=kubernetes \
            --cluster-signing-cert-file=/var/lib/kubernetes/ca.crt \
            --cluster-signing-key-file=/var/lib/kubernetes/ca.key \
            --kubeconfig=/var/lib/kubernetes/kube-controller-manager.kubeconfig \
            --root-ca-file=/var/lib/kubernetes/ca.crt \
            --service-account-private-key-file=/var/lib/kubernetes/service-accounts.key \
            --service-cluster-ip-range=10.32.0.0/24 \
            --use-service-account-credentials=true \
            --v=2
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    # ── kube-scheduler ────────────────────────────────────────────────────────
    - name: Create kube-scheduler config
      ansible.builtin.copy:
        dest: /etc/kubernetes/config/kube-scheduler.yaml
        content: |
          apiVersion: kubescheduler.config.k8s.io/v1
          kind: KubeSchedulerConfiguration
          clientConnection:
            kubeconfig: "/var/lib/kubernetes/kube-scheduler.kubeconfig"
          leaderElection:
            leaderElect: true

    - name: Create kube-scheduler systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/kube-scheduler.service
        content: |
          [Unit]
          Description=Kubernetes Scheduler
          Documentation=https://github.com/kubernetes/kubernetes

          [Service]
          ExecStart=/usr/local/bin/kube-scheduler \
            --config=/etc/kubernetes/config/kube-scheduler.yaml \
            --v=2
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    # ── Start services ────────────────────────────────────────────────────────
    - name: Enable and start control plane services
      ansible.builtin.systemd:
        name: "{{ item }}"
        daemon_reload: true
        enabled: true
        state: started
      loop:
        - kube-apiserver
        - kube-controller-manager
        - kube-scheduler

    - name: Wait for API server to be ready
      ansible.builtin.wait_for:
        port: 6443
        host: 127.0.0.1
        delay: 5
        timeout: 60

    # ── Verify ────────────────────────────────────────────────────────────────
    - name: Check cluster info
      ansible.builtin.shell: kubectl cluster-info --kubeconfig /root/admin.kubeconfig
      register: cluster_info
      changed_when: false

    - name: Show cluster info
      ansible.builtin.debug:
        msg: "{{ cluster_info.stdout }}"

    # ── RBAC for kubelet authorization ────────────────────────────────────────
    - name: Copy kube-apiserver-to-kubelet RBAC manifest
      ansible.builtin.copy:
        dest: /root/kube-apiserver-to-kubelet.yaml
        content: |
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            annotations:
              rbac.authorization.kubernetes.io/autoupdate: "true"
            labels:
              kubernetes.io/bootstrapping: rbac-defaults
            name: system:kube-apiserver-to-kubelet
          rules:
            - apiGroups:
                - ""
              resources:
                - nodes/proxy
                - nodes/stats
                - nodes/log
                - nodes/spec
                - nodes/metrics
              verbs:
                - "*"
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: system:kube-apiserver
            namespace: ""
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: system:kube-apiserver-to-kubelet
          subjects:
            - apiGroup: rbac.authorization.k8s.io
              kind: User
              name: kubernetes

    - name: Apply RBAC for kubelet authorization
      ansible.builtin.shell: kubectl apply -f /root/kube-apiserver-to-kubelet.yaml --kubeconfig /root/admin.kubeconfig
      register: rbac_result
      changed_when: "'created' in rbac_result.stdout or 'configured' in rbac_result.stdout"
