---
- name: Generate kubeconfig files on jumpbox
  hosts: jumpbox
  gather_facts: false

  vars:
    cert_dir: /root/certs
    server_ip: "10.142.131.11"

  tasks:
    - name: Install kubectl on jumpbox
      ansible.builtin.copy:
        src: /tmp/kubectl
        dest: /usr/local/bin/kubectl
        mode: "0755"

    # ── Worker kubeconfigs ────────────────────────────────────────────────────
    - name: Generate kubelet kubeconfig for {{ item }}
      ansible.builtin.shell: |
        cd {{ cert_dir }}
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority=ca.pem \
          --embed-certs=true \
          --server=https://{{ server_ip }}:6443 \
          --kubeconfig={{ item }}.kubeconfig

        kubectl config set-credentials system:node:{{ item }} \
          --client-certificate={{ item }}.pem \
          --client-key={{ item }}-key.pem \
          --embed-certs=true \
          --kubeconfig={{ item }}.kubeconfig

        kubectl config set-context default \
          --cluster=kubernetes-the-hard-way \
          --user=system:node:{{ item }} \
          --kubeconfig={{ item }}.kubeconfig

        kubectl config use-context default \
          --kubeconfig={{ item }}.kubeconfig
      args:
        creates: "{{ cert_dir }}/{{ item }}.kubeconfig"
      loop:
        - node-0
        - node-1

    # ── kube-proxy kubeconfig ─────────────────────────────────────────────────
    - name: Generate kube-proxy kubeconfig
      ansible.builtin.shell: |
        cd {{ cert_dir }}
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority=ca.pem \
          --embed-certs=true \
          --server=https://{{ server_ip }}:6443 \
          --kubeconfig=kube-proxy.kubeconfig

        kubectl config set-credentials system:kube-proxy \
          --client-certificate=kube-proxy.pem \
          --client-key=kube-proxy-key.pem \
          --embed-certs=true \
          --kubeconfig=kube-proxy.kubeconfig

        kubectl config set-context default \
          --cluster=kubernetes-the-hard-way \
          --user=system:kube-proxy \
          --kubeconfig=kube-proxy.kubeconfig

        kubectl config use-context default \
          --kubeconfig=kube-proxy.kubeconfig
      args:
        creates: "{{ cert_dir }}/kube-proxy.kubeconfig"

    # ── kube-controller-manager kubeconfig ───────────────────────────────────
    - name: Generate kube-controller-manager kubeconfig
      ansible.builtin.shell: |
        cd {{ cert_dir }}
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority=ca.pem \
          --embed-certs=true \
          --server=https://{{ server_ip }}:6443 \
          --kubeconfig=kube-controller-manager.kubeconfig

        kubectl config set-credentials system:kube-controller-manager \
          --client-certificate=kube-controller-manager.pem \
          --client-key=kube-controller-manager-key.pem \
          --embed-certs=true \
          --kubeconfig=kube-controller-manager.kubeconfig

        kubectl config set-context default \
          --cluster=kubernetes-the-hard-way \
          --user=system:kube-controller-manager \
          --kubeconfig=kube-controller-manager.kubeconfig

        kubectl config use-context default \
          --kubeconfig=kube-controller-manager.kubeconfig
      args:
        creates: "{{ cert_dir }}/kube-controller-manager.kubeconfig"

    # ── kube-scheduler kubeconfig ─────────────────────────────────────────────
    - name: Generate kube-scheduler kubeconfig
      ansible.builtin.shell: |
        cd {{ cert_dir }}
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority=ca.pem \
          --embed-certs=true \
          --server=https://{{ server_ip }}:6443 \
          --kubeconfig=kube-scheduler.kubeconfig

        kubectl config set-credentials system:kube-scheduler \
          --client-certificate=kube-scheduler.pem \
          --client-key=kube-scheduler-key.pem \
          --embed-certs=true \
          --kubeconfig=kube-scheduler.kubeconfig

        kubectl config set-context default \
          --cluster=kubernetes-the-hard-way \
          --user=system:kube-scheduler \
          --kubeconfig=kube-scheduler.kubeconfig

        kubectl config use-context default \
          --kubeconfig=kube-scheduler.kubeconfig
      args:
        creates: "{{ cert_dir }}/kube-scheduler.kubeconfig"

    # ── admin kubeconfig ──────────────────────────────────────────────────────
    - name: Generate admin kubeconfig
      ansible.builtin.shell: |
        cd {{ cert_dir }}
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority=ca.pem \
          --embed-certs=true \
          --server=https://127.0.0.1:6443 \
          --kubeconfig=admin.kubeconfig

        kubectl config set-credentials admin \
          --client-certificate=admin.pem \
          --client-key=admin-key.pem \
          --embed-certs=true \
          --kubeconfig=admin.kubeconfig

        kubectl config set-context default \
          --cluster=kubernetes-the-hard-way \
          --user=admin \
          --kubeconfig=admin.kubeconfig

        kubectl config use-context default \
          --kubeconfig=admin.kubeconfig
      args:
        creates: "{{ cert_dir }}/admin.kubeconfig"

- name: Fetch kubeconfigs from jumpbox to host
  hosts: jumpbox
  gather_facts: false

  tasks:
    - name: Fetch kubeconfigs to /tmp/k8s-configs/
      ansible.builtin.fetch:
        src: "/root/certs/{{ item }}"
        dest: /tmp/k8s-configs/
        flat: true
      loop:
        - node-0.kubeconfig
        - node-1.kubeconfig
        - kube-proxy.kubeconfig
        - kube-controller-manager.kubeconfig
        - kube-scheduler.kubeconfig
        - admin.kubeconfig

- name: Distribute kubeconfigs to worker nodes
  hosts: workers
  gather_facts: false

  tasks:
    - name: Create kubelet and kube-proxy dirs on worker
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /var/lib/kubelet
        - /var/lib/kube-proxy

    - name: Copy kubelet kubeconfig to worker
      ansible.builtin.copy:
        src: "/tmp/k8s-configs/{{ hostname }}.kubeconfig"
        dest: /var/lib/kubelet/kubeconfig
        mode: "0600"

    - name: Copy kube-proxy kubeconfig to worker
      ansible.builtin.copy:
        src: /tmp/k8s-configs/kube-proxy.kubeconfig
        dest: /var/lib/kube-proxy/kubeconfig
        mode: "0600"

- name: Distribute kubeconfigs to control plane
  hosts: control_plane
  gather_facts: false

  tasks:
    - name: Copy controller-manager, scheduler and admin kubeconfigs to server
      ansible.builtin.copy:
        src: "/tmp/k8s-configs/{{ item }}"
        dest: "/root/{{ item }}"
        mode: "0600"
      loop:
        - admin.kubeconfig
        - kube-controller-manager.kubeconfig
        - kube-scheduler.kubeconfig
