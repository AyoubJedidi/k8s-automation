---
- name: Fetch admin certs from jumpbox
  hosts: jumpbox
  gather_facts: false

  tasks:
    - name: Fetch CA and admin certs to host
      ansible.builtin.fetch:
        src: "/root/certs/{{ item }}"
        dest: /tmp/k8s-certs/
        flat: true
      loop:
        - ca.pem
        - admin.pem
        - admin-key.pem

- name: Configure kubectl for remote access on host
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    server_ip: "10.142.131.11"
    certs_dir: /tmp/k8s-certs
    configs_dir: /tmp/k8s-configs

  tasks:
    - name: Create ~/.kube directory
      ansible.builtin.file:
        path: "~/.kube"
        state: directory
        mode: "0700"

    - name: Configure kubectl cluster
      ansible.builtin.shell: |
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority={{ certs_dir }}/ca.pem \
          --embed-certs=true \
          --server=https://{{ server_ip }}:6443
      changed_when: true

    - name: Configure kubectl credentials
      ansible.builtin.shell: |
        kubectl config set-credentials admin \
          --client-certificate={{ certs_dir }}/admin.pem \
          --client-key={{ certs_dir }}/admin-key.pem \
          --embed-certs=true
      changed_when: true

    - name: Configure kubectl context
      ansible.builtin.shell: |
        kubectl config set-context kubernetes-the-hard-way \
          --cluster=kubernetes-the-hard-way \
          --user=admin
      changed_when: true

    - name: Use kubernetes-the-hard-way context
      ansible.builtin.shell: kubectl config use-context kubernetes-the-hard-way
      changed_when: true

    - name: Verify kubectl version
      ansible.builtin.shell: kubectl version
      register: kubectl_version
      changed_when: false

    - name: Show version
      ansible.builtin.debug:
        msg: "{{ kubectl_version.stdout }}"

    - name: List nodes
      ansible.builtin.shell: kubectl get nodes
      register: nodes
      changed_when: false

    - name: Show nodes
      ansible.builtin.debug:
        msg: "{{ nodes.stdout }}"
